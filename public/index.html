<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartestKing — 文件分析</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e2e2e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 8px;
      color: #888;
      font-size: 1rem;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
    }

    #drop-zone {
      border: 2px dashed #3a3a50;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    #drop-zone.drag-over {
      border-color: #a78bfa;
      background: rgba(167, 139, 250, 0.05);
    }

    #drop-zone svg {
      width: 48px;
      height: 48px;
      color: #555;
      margin-bottom: 12px;
    }

    #drop-zone p {
      color: #888;
      font-size: 0.95rem;
    }

    #drop-zone strong {
      color: #a78bfa;
    }

    #file-input {
      display: none;
    }

    #file-info {
      margin-top: 16px;
      padding: 12px 16px;
      background: #12121a;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #a78bfa;
      display: none;
      align-items: center;
      gap: 8px;
    }

    #file-info.visible { display: flex; }

    #analyze-btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #analyze-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    #analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #status {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      margin-top: 16px;
      min-height: 20px;
    }

    #status.error { color: #f87171; }

    #result-card {
      display: none;
      width: 100%;
      max-width: 720px;
    }

    #result-card.visible { display: block; }

    #result-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .markdown-body {
      line-height: 1.75;
      color: #d4d4dc;
      font-size: 0.95rem;
    }

    .markdown-body h1, .markdown-body h2 {
      color: #a78bfa;
      margin: 1.4em 0 0.6em;
      font-weight: 700;
    }

    .markdown-body h3 { color: #60a5fa; margin: 1.2em 0 0.5em; }

    .markdown-body strong { color: #f0f0f5; }

    .markdown-body ul, .markdown-body ol {
      padding-left: 1.5em;
      margin: 0.6em 0;
    }

    .markdown-body li { margin: 0.3em 0; }

    .markdown-body p { margin: 0.7em 0; }

    .markdown-body code {
      background: #12121a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
      color: #60a5fa;
    }

    .markdown-body pre {
      background: #12121a;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1em 0;
    }

    .markdown-body blockquote {
      border-left: 3px solid #a78bfa;
      padding-left: 16px;
      color: #888;
      margin: 0.8em 0;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #555;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <h1>SmartestKing</h1>
    <p>頂級 AI 文件分析 · 重點摘要專家</p>
  </header>

  <div class="card">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.632-8.664 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>拖曳檔案到此處，或 <strong>點擊上傳</strong></p>
      <p style="margin-top:6px;font-size:0.8rem;color:#555;">支援 PDF、TXT · 最大 20MB</p>
    </div>
    <input type="file" id="file-input" accept=".pdf,.txt" />

    <div id="file-info">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span id="file-name"></span>
    </div>

    <button id="analyze-btn" disabled>開始分析</button>
    <div id="status"></div>
  </div>

  <div class="card" id="result-card">
    <h2>分析結果</h2>
    <div id="result-content" class="markdown-body"></div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileInfo = document.getElementById('file-info');
    const fileName = document.getElementById('file-name');
    const analyzeBtn = document.getElementById('analyze-btn');
    const statusEl = document.getElementById('status');
    const resultCard = document.getElementById('result-card');
    const resultContent = document.getElementById('result-content');

    let selectedFile = null;

    function setFile(file) {
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['pdf', 'txt'].includes(ext)) {
        showStatus('只支援 PDF 和 TXT 檔案', true);
        return;
      }
      selectedFile = file;
      fileName.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
      fileInfo.classList.add('visible');
      analyzeBtn.disabled = false;
      showStatus('');
    }

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      setFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => setFile(fileInput.files[0]));

    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      analyzeBtn.disabled = true;
      resultCard.classList.remove('visible');
      showStatus('<span class="spinner"></span>分析中，請稍候...');

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || '伺服器錯誤');

        resultContent.innerHTML = marked.parse(data.summary);
        resultCard.classList.add('visible');
        showStatus('');
        resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (err) {
        showStatus(err.message, true);
      } finally {
        analyzeBtn.disabled = false;
      }
    });

    function showStatus(msg, isError = false) {
      statusEl.innerHTML = msg;
      statusEl.className = isError ? 'error' : '';
    }
  </script>
</body>
</html>
